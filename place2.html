<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place 2</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .overlay {
            background:
                linear-gradient(rgba(100, 100, 100, 0.45), rgba(0, 0, 0, 0.45)),
                url("stnun2.jpg");
            background-size: cover;
            background-position: center;
        }
    </style>
</head>

<body>
    <div class="overlay">
        <a class="nav previous" id="backBtn" onclick="previous()">⬅ Previous</a>
        <a class="nav menu" id="menuBtn" href="index.html">Menu</a>
        <a class="nav next" id="nextBtn" onclick="next()">Next ➡</a>
        <h1 id="title">Altar</h1>

        <div class="text" id="desc">
            You have now arrived at the chancel and here is the altar.
            It is a simple wooden altar in St Nun's at the east end of
            the church. Take a moment to look at the stone carvings which are very interesting.
        </div>

        <div class="buttons">
            <input type="range" id="progressBar" value="0" max="100" step="0.1">
            <div class="audio-controls-group">
                <button class="restart" id="restartBtn" onclick="restartAudio()" title="Restart">
                    <img src="./restart.svg" height="24" width="24">
                </button>
                <span id="headphones">🎧</span>
                <button class="listen" id="listenBtn" onclick="toggleAudio()" title="Play/Pause">
                    <img src="./play.svg" height="24" width="24">
                </button>
            </div>
        </div>

        <audio id="voice" src="stnun2.mp3" preload="auto"></audio>
        <script src="player.js"></script>
        <script>
            function next() {
                window.location.href = "index.html";
            }

            function previous() {
                window.location.href = "place1.html";
            }
        </script>
</body>

</html>
