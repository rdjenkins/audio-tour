<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Locations</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {

            font-family: "Segoe UI", Arial, sans-serif;
            color: white;

            height: 100vh;

            background: black;

            display: flex;
            justify-content: center;

        }

        /* กรอบมือถือ */

        .overlay {

            width: 100%;
            max-width: 420px;

            min-height: 100vh;

            background:
                linear-gradient(rgba(100, 100, 100, 0.45), rgba(0, 0, 0, 0.45)),
                url("St-Nun.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 30px 20px;
            position: relative;

        }

        /* title */

        h1 {

            text-align: center;
            margin-top: 50px;
            font-size: 28px;

        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 22px;
        }

        /* grid */

        .grid {

            display: grid;

            grid-template-columns: 1fr;

            gap: 16px;

        }

        /* card */

        .card {

            background: rgba(255, 255, 255, 0.15);

            padding: 18px;

            border-radius: 16px;

            text-decoration: none;

            color: white;

            font-size: 17px;

            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);

            display: block;

            transition: 0.2s;

        }

        .card:hover {

            transform: scale(1.02);

        }

        .card:active {

            transform: scale(0.97);

        }

        .number {

            font-size: 20px;
            font-weight: bold;

            margin-bottom: 6px;

        }
    </style>

</head>

<body>

    <div class="overlay">

        <h1 id="title">St Nun's</h1>
        <h2>audio tour</h2>

        <div class="grid">

            <a class="card" href="place1.html">
                <div class="number">1</div>
                <span id="p1">Front</span>
            </a>

            <a class="card" href="place2.html">
                <div class="number">2</div>
                <span id="p2">Altar</span>
            </a>

        </div>

    </div>

</body>

</html>
